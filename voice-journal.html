<!DOCTYPE html>
<html lang="ja">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="音声日記">
<title>音声ジャーナル</title>
<style>h
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap');

  :root {
    --bg: #0f0e0c;
    --bg2: #1a1814;
    --bg3: #252219;
    --text: #e8e0d0;
    --text2: #a09080;
    --accent: #c8a96e;
    --accent2: #8b6f3e;
    --red: #c06060;
    --green: #6a9e7a;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
    overflow-x: hidden;
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    flex-direction: column;
    padding: env(safe-area-inset-top, 20px) 24px env(safe-area-inset-bottom, 20px);
  }
  .screen.active { display: flex; }

  /* ===== SETUP SCREEN ===== */
  #setupScreen {
    justify-content: center;
    gap: 32px;
  }

  .setup-header {
    text-align: center;
  }
  .setup-header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .setup-header p {
    font-size: 13px;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  .field-group { display: flex; flex-direction: column; gap: 16px; }

  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent2); }
  .field input::placeholder { color: var(--text2); opacity: 0.5; }

  .btn-primary {
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    width: 100%;
  }
  .btn-primary:active { opacity: 0.8; transform: scale(0.98); }

  /* ===== MAIN SCREEN ===== */
  #mainScreen { justify-content: space-between; }

  .main-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
  }
  .main-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--accent);
    letter-spacing: 0.1em;
  }
  .settings-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 20px;
    padding: 4px;
  }

  .record-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 40px 0;
  }

  .status-text {
    font-size: 13px;
    color: var(--text2);
    letter-spacing: 0.1em;
    text-align: center;
    min-height: 20px;
    transition: opacity 0.3s;
  }

  .mic-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid var(--accent2);
    background: var(--bg2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  .mic-btn svg { width: 48px; height: 48px; color: var(--accent); transition: all 0.3s; }
  .mic-btn:active { transform: scale(0.95); }

  .mic-btn.recording {
    border-color: var(--red);
    background: rgba(192, 96, 96, 0.1);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .mic-btn.recording svg { color: var(--red); }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(192, 96, 96, 0.3); }
    50% { box-shadow: 0 0 0 20px rgba(192, 96, 96, 0); }
  }

  .transcript-box {
    width: 100%;
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 20px;
    min-height: 120px;
    max-height: 200px;
    overflow-y: auto;
    border: 1px solid var(--bg3);
  }
  .transcript-box p {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }
  .transcript-box .interim {
    color: var(--text2);
    opacity: 0.6;
  }
  .transcript-placeholder {
    font-size: 13px;
    color: var(--text2);
    opacity: 0.4;
    font-style: italic;
  }

  .action-row {
    display: flex;
    gap: 12px;
    padding-bottom: 12px;
  }
  .btn-secondary {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--bg3);
    border-radius: 12px;
    padding: 14px;
    color: var(--text2);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .btn-secondary:active { opacity: 0.7; }
  .btn-send {
    flex: 2;
    background: var(--accent2);
    border: none;
    border-radius: 12px;
    padding: 14px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-send:active { opacity: 0.8; }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ===== PROCESSING SCREEN ===== */
  #processingScreen { justify-content: center; align-items: center; gap: 24px; }

  .processing-icon {
    width: 80px; height: 80px;
    border: 2px solid var(--bg3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .processing-label {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    color: var(--text2);
    letter-spacing: 0.1em;
  }

  /* ===== RESULT SCREEN ===== */
  #resultScreen { gap: 20px; padding-top: 24px; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }
  .result-time {
    font-size: 12px;
    color: var(--text2);
  }

  .result-body {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 4px;
    flex: 1;
    border: 1px solid var(--bg3);
    max-height: 280px;
    position: relative;
    transition: border-color 0.2s;
  }
  .result-body:focus-within {
    border-color: var(--accent2);
  }
  .result-body textarea {
    width: 100%;
    height: 100%;
    min-height: 200px;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    padding: 16px;
    font-family: 'Noto Serif JP', serif;
    font-size: 15px;
    line-height: 2;
    color: var(--text);
    -webkit-appearance: none;
    overflow-y: auto;
  }
  .edit-hint {
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.08em;
    text-align: right;
    padding: 0 4px 4px;
  }

  .mood-section, .tag-section { display: flex; flex-direction: column; gap: 10px; }
  .section-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text2);
    text-transform: uppercase;
  }

  .mood-row, .tag-row { display: flex; flex-wrap: wrap; gap: 8px; }

  .chip {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--bg3);
    background: var(--bg2);
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .chip.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200, 169, 110, 0.1);
  }
  .chip:active { opacity: 0.7; }

  .result-actions { display: flex; gap: 12px; padding-bottom: 12px; }
  .btn-save {
    flex: 1;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    padding: 16px;
    color: #0f0e0c;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-save:active { opacity: 0.8; transform: scale(0.98); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 20px) + 80px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
    border: 1px solid var(--bg3);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setupScreen" class="screen">
  <div class="setup-header">
    <h1>音声ジャーナル</h1>
    <p>初回設定を行ってください</p>
        <p style="font-size:12px;color:#888;margin-top:4px;">v2.3</p>
  </div>
  <div class="field-group">
    <div class="field">
      <label>Claude API キー</label>
      <input type="password" id="claudeKey" placeholder="sk-ant-..." autocomplete="off">
    </div>
    <div class="field">
      <label>Notion トークン</label>
      <input type="password" id="notionToken" placeholder="secret_..." autocomplete="off">
    </div>
    <div class="field">
      <label>Notion データベース ID</label>
      <input type="text" id="notionDbId" value="3380f4bd26f68088aab6fcfbb5c260a5" autocomplete="off">
    </div>
  </div>
  <button class="btn-primary" onclick="saveSettings()">設定を保存して始める</button>
</div>

<!-- ===== MAIN SCREEN ===== -->
<div id="mainScreen" class="screen">
  <div class="main-header">
    <span class="main-title">音声ジャーナル</span>
    <button class="settings-btn" onclick="showScreen('setupScreen')" title="設定">?</button>
  </div>

  <div class="record-area">
    <div class="status-text" id="statusText">タップして録音開始</div>
    <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div class="transcript-box" id="transcriptBox">
      <span class="transcript-placeholder" id="transcriptPlaceholder">話した内容がここに表示されます</span>
      <span id="transcriptFinal"></span>
      <span id="transcriptInterim" class="interim"></span>
    </div>
  </div>

  <div class="action-row">
    <button class="btn-secondary" onclick="clearTranscript()">クリア</button>
    <button class="btn-send" id="sendBtn" onclick="processAndSave()" disabled>AIで整形して保存</button>
  </div>
</div>

<!-- ===== PROCESSING SCREEN ===== -->
<div id="processingScreen" class="screen">
  <div class="processing-icon"></div>
  <div class="processing-label" id="processingLabel">AIが整形中...</div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="resultScreen" class="screen">
  <div class="result-header">
    <span class="result-title">整形結果</span>
    <span class="result-time" id="resultTime"></span>
  </div>

  <div class="result-body">
    <textarea id="resultText" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
  </div>
  <div class="edit-hint">? タップして編集できます</div>

  <div class="mood-section">
    <div class="section-label">気分</div>
    <div class="mood-row">
      <button class="chip" onclick="selectMood('良い')">  良い</button>
      <button class="chip" onclick="selectMood('普通')">  普通</button>
      <button class="chip" onclick="selectMood('悪い')">  悪い</button>
    </div>
  </div>

  <div class="tag-section">
    <div class="section-label">タグ（複数選択可）</div>
    <div class="tag-row">
      <button class="chip" onclick="toggleTag('家族')">家族</button>
      <button class="chip" onclick="toggleTag('健康')">健康</button>
      <button class="chip" onclick="toggleTag('仕事')">仕事</button>
      <button class="chip" onclick="toggleTag('趣味')">趣味</button>
      <button class="chip" onclick="toggleTag('気づき')">気づき</button>
      <button class="chip" onclick="toggleTag('山形')">山形</button>
      <button class="chip" onclick="toggleTag('食事')">食事</button>
      <button class="chip" onclick="toggleTag('外出')">外出</button>
    </div>
  </div>

  <div class="result-actions">
    <button class="btn-secondary" style="flex:1" onclick="showScreen('mainScreen')">戻る</button>
    <button class="btn-save" onclick="saveToNotion()">Notionに保存</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

// ===== SETTINGS =====
function loadSettings() {
  return {
    claudeKey: localStorage.getItem('vj_claude_key') || '',
    notionToken: localStorage.getItem('vj_notion_token') || '',
    notionDbId: localStorage.getItem('vj_notion_db') || '3380f4bd26f68088aab6fcfbb5c260a5'
  };
}

function saveSettings() {
  const key = document.getElementById('claudeKey').value.trim();
  const token = document.getElementById('notionToken').value.trim();
  const db = document.getElementById('notionDbId').value.trim();

  if (!key || !token || !db) {
    showToast('すべての項目を入力してください', 'error');
    return;
  }

  localStorage.setItem('vj_claude_key', key);
  localStorage.setItem('vj_notion_token', token);
  localStorage.setItem('vj_notion_db', db);
  showToast('設定を保存しました', 'success');
  showScreen('mainScreen');
}

// ===== SCREEN MANAGEMENT =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  // Setup screen: prefill saved values
  if (id === 'setupScreen') {
    const s = loadSettings();
    if (s.claudeKey) document.getElementById('claudeKey').value = s.claudeKey;
    if (s.notionToken) document.getElementById('notionToken').value = s.notionToken;
    if (s.notionDbId) document.getElementById('notionDbId').value = s.notionDbId;
  }
}

// ===== SPEECH RECOGNITION =====
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('このブラウザは音声認識に対応していません', 'error');
    return null;
  }
  const r = new SR();
  r.lang = 'ja-JP';
  r.continuous = true;
  r.interimResults = true;

  r.onresult = (e) => {
    interimTranscript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalTranscript += t;
      } else {
        interimTranscript += t;
      }
    }
    updateTranscriptDisplay();
    document.getElementById('sendBtn').disabled = !finalTranscript.trim();
  };

  r.onend = () => {
    if (isRecording) {
      try { r.start(); } catch(e) {}
    }
  };

  r.onerror = (e) => {
    if (e.error !== 'no-speech') {
      showToast('音声認識エラー: ' + e.error, 'error');
      stopRecording();
    }
  };

  return r;
}

function updateTranscriptDisplay() {
  const placeholder = document.getElementById('transcriptPlaceholder');
  const finalEl = document.getElementById('transcriptFinal');
  const interimEl = document.getElementById('transcriptInterim');

  if (finalTranscript || interimTranscript) {
    placeholder.style.display = 'none';
    finalEl.textContent = finalTranscript;
    interimEl.textContent = interimTranscript;
  } else {
    placeholder.style.display = '';
    finalEl.textContent = '';
    interimEl.textContent = '';
  }
}

function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  if (!recognition) recognition = initRecognition();
  if (!recognition) return;

  try {
    recognition.start();
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('statusText').textContent = '録音中... タップで停止';
  } catch (e) {
    showToast('録音を開始できませんでした', 'error');
  }
}

function stopRecording() {
  if (recognition) {
    isRecording = false;
    recognition.stop();
  }
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('statusText').textContent = 'タップして録音開始';
  interimTranscript = '';
  updateTranscriptDisplay();
}

function clearTranscript() {
  stopRecording();
  finalTranscript = '';
  interimTranscript = '';
  updateTranscriptDisplay();
  document.getElementById('sendBtn').disabled = true;
}

// ===== CLAUDE API =====
async function formatWithClaude(text) {
  const s = loadSettings();
  const dictStr = DICTIONARY.map(e => `「${e.r}」→「${e.c}」`).join(' ');

  const prompt = `以下の音声入力テキストを、自然な一人称の日記文体（です・ます調ではなく、だ・である調）に整えてください。

【ルール】
・話者が実際に言った内容のみをもとに整える
・感情・意図・背景の推測や補足は一切加えない
・言っていないことを補完しない
・以下の固有名詞辞書を参照して誤変換を修正する
・辞書にない固有名詞は原文のままにする
・整形したテキストのみ出力する（説明・タイトル不要）

【固有名詞辞書】
${dictStr}

【音声入力テキスト】
${text}`;

  let res;
  try {
    res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': s.claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
  } catch(e) {
    throw new Error('通信エラー: ' + e.message + ' / キー先頭: ' + s.claudeKey.slice(0,12));
  }

  if (!res.ok) {
    const errText = await res.text();
    throw new Error('HTTP ' + res.status + ': ' + errText.slice(0, 150));
  }

  const data = await res.json();
  return data.content[0].text.trim();
}

// ===== PROCESS =====
async function processAndSave() {
  const text = finalTranscript.trim();
  if (!text) return;

  stopRecording();
  showScreen('processingScreen');
  document.getElementById('processingLabel').textContent = 'AIが日記に整形中...';

  try {
    formattedText = await formatWithClaude(text);

    // Set result time
    const now = new Date();
    document.getElementById('resultTime').textContent =
      now.toLocaleDateString('ja-JP') + ' ' +
      now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});

    document.getElementById('resultText').value = formattedText;

    // Reset mood/tags
    selectedMood = '';
    selectedTags = [];
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));

    showScreen('resultScreen');
  } catch (e) {
    showToast('エラー: ' + e.message, 'error');
    showScreen('mainScreen');
  }
}

// ===== MOOD & TAGS =====
function selectMood(mood) {
  selectedMood = mood;
  document.querySelectorAll('.mood-row .chip').forEach(c => {
    c.classList.toggle('selected', c.textContent.includes(mood));
  });
}

function toggleTag(tag) {
  const idx = selectedTags.indexOf(tag);
  if (idx === -1) {
    selectedTags.push(tag);
  } else {
    selectedTags.splice(idx, 1);
  }
  document.querySelectorAll('.tag-row .chip').forEach(c => {
    c.classList.toggle('selected', selectedTags.includes(c.textContent));
  });
}

// ===== NOTION =====
async function saveToNotion() {
  const s = loadSettings();
  // textareaの現在の内容を使う（編集済みの場合はそちらを優先）
  const currentText = document.getElementById('resultText').value.trim() || formattedText;
  const now = new Date();
  const dateStr = now.toISOString();
  const timeStr = now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
  const titleStr = now.toLocaleDateString('ja-JP') + ' ' + timeStr + '　' +
    currentText.slice(0, 30).replace(/\n/g, ' ') + '…';

  showScreen('processingScreen');
  document.getElementById('processingLabel').textContent = 'Notionに保存中...';

  const props = {
    '名前': { title: [{ text: { content: titleStr } }] },
    '日付': { date: { start: dateStr } },
    '時刻': { date: { start: new Date().toISOString().slice(0, 19) } },
    '本文': { rich_text: [{ text: { content: currentText.slice(0, 2000) } }] }
  };

  if (selectedMood) props['気分'] = { select: { name: selectedMood } };
  if (selectedTags.length) props['タグ'] = { multi_select: selectedTags.map(t => ({ name: t })) };

  const body = {
    parent: { database_id: s.notionDbId },
    properties: props,
    children: [{
      object: 'block',
      type: 'paragraph',
      paragraph: {
        rich_text: [{ type: 'text', text: { content: currentText } }]
      }
    }]
  };

  try {
    const res = await fetch('https://notion-proxy.crimson-breeze-6bca.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      showToast('Notionに保存しました ?', 'success');
      clearTranscript();
      showScreen('mainScreen');
    } else {
      const err = await res.json();
      throw new Error(err.message || 'Notion APIエラー');
    }
  } catch (e) {
    // CORSエラーの可能性 → テキストをコピーして案内
    showScreen('resultScreen');
    showToast('保存失敗: ' + e.message, 'error');
  }
}

// ===== TOAST =====
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ===== INIT =====
window.addEventListener('load', () => {
  const s = loadSettings();
  if (s.claudeKey) {
    showScreen('mainScreen');
  } else {
    showScreen('setupScreen');
  }
});
